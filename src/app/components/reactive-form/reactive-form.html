<div class="container">
  <label for="name">Name: </label>
  <input id="name" type="text" (keydown)="handleChange($event)" [formControl]="name"  >
  <p>Value: {{ name.value }}</p>
  <button type="button" (click)="updateName()">Update Name</button>
</div>

<div class="container">
  <form [formGroup]="myProfileForm" (ngSubmit)="onSubmit()">
    <!-- <input id="first-name" type="text" [formControl]="myProfileForm.controls.firstName" /> -->
    <label for="first-name">First Name: </label>
    <input id="first-name" type="text" formControlName="firstName" />
    @let firstName = myProfileForm.controls.firstName;
    @if(firstName.touched && firstName.valid) {
      <p class="error">Enter a proper name</p>
    }

    <label for="last-name">Last Name: </label>
    <input id="last-name" type="text" formControlName="lastName" />

    <label for="email">Email: </label>
    <input id="email" type="text" formControlName="email" />
    
    <div formGroupName="address">      
      <h2>Address</h2>
      <label for="street">Street: </label>
      <input id="street" type="text" formControlName="street" />
      <label for="city">City: </label>
      <input id="city" type="text" formControlName="city" />
      <label for="state">State: </label>
      <input id="state" type="text" formControlName="state" />
      <label for="zip">ZipCode: </label>
      <input id="zip" type="text" formControlName="zip" />
    </div>
    <button type="submit" [disabled]="!myProfileForm.valid">Submit</button>
    <button type="button" (click)="updateProfile()">Update Name</button>
    <button type="button" (click)="setProfile()">Set Profile</button>
  </form>
</div>
